<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sparks — Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0c;
    --card-bg: #141418;
    --card-border: #2a2a32;
    --text: #e8e4df;
    --text-dim: #8a8680;
    --accent: #c4956a;
    --accent-dim: #8a6a4a;
    --flip-bg: #1a1810;
    --flip-border: #3a3428;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* --- HEADER --- */
  header {
    text-align: center;
    padding: 3rem 2rem 1.5rem;
    position: relative;
  }
  header h1 {
    font-size: 2.8rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 0.3rem;
  }
  header::after {
    content: '';
    display: block;
    width: 60px;
    height: 1px;
    background: var(--accent-dim);
    margin: 1.5rem auto 0;
  }

  /* --- FILTER BAR --- */
  .filters {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.6rem 2rem;
    flex-wrap: wrap;
  }
  .filters:first-of-type {
    padding-top: 1rem;
  }
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .filter-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    opacity: 0.5;
    display: flex;
    align-items: center;
    padding-right: 0.3rem;
  }
  .filter-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.4rem 1rem;
    border: 1px solid var(--card-border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.3s ease;
    border-radius: 2px;
  }
  .filter-btn:hover, .filter-btn.active {
    color: var(--accent);
    border-color: var(--accent-dim);
    background: rgba(196, 149, 106, 0.06);
  }

  /* --- GRID --- */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1.5rem;
    padding: 2rem 3rem 4rem;
    max-width: 1200px;
    margin: 0 auto;
    transition: opacity 0.4s ease;
  }
  .grid.dimmed {
    opacity: 0.08;
    pointer-events: none;
  }

  /* --- CARD --- */
  .card-container {
    perspective: 900px;
    height: 320px;
    cursor: pointer;
    opacity: 0;
    transform: translateY(20px);
    animation: cardIn 0.5s ease forwards;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
  }
  @keyframes cardIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card.flipped {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border: 1px solid var(--card-border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-radius: 3px;
  }

  /* FRONT */
  .card-front {
    background: var(--card-bg);
  }
  .card-portrait {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .card-portrait svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  .card-portrait .silhouette {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 70%;
    background: linear-gradient(to top, rgba(20,20,24,0.95) 0%, transparent 100%);
    z-index: 1;
  }
  .card-info {
    padding: 1rem 1.2rem;
    position: relative;
    z-index: 2;
    background: var(--card-bg);
    border-top: 1px solid var(--card-border);
  }
  .card-name {
    font-size: 1.15rem;
    font-weight: 600;
    margin-bottom: 0.2rem;
    line-height: 1.2;
  }
  .card-years {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }
  .card-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.55rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 0.3rem;
  }

  /* BACK */
  .card-back {
    background: var(--flip-bg);
    border-color: var(--flip-border);
    transform: rotateY(180deg);
    padding: 1.2rem;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .card-back .back-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.6rem;
    flex-shrink: 0;
  }
  .card-back .back-idea {
    font-size: 0.88rem;
    line-height: 1.55;
    color: var(--text);
    font-style: italic;
  }
  .card-back .back-name {
    margin-top: auto;
    padding-top: 0.8rem;
    font-size: 0.75rem;
    color: var(--text-dim);
    text-align: right;
    flex-shrink: 0;
  }

  /* --- FOCUSED OVERLAY --- */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    align-items: center;
    justify-content: center;
    background: rgba(6, 6, 8, 0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    opacity: 0;
    transition: opacity 0.35s ease;
  }
  .overlay.visible {
    display: flex;
    opacity: 1;
  }
  .overlay .focused-card {
    perspective: 1200px;
    width: 340px;
    height: 480px;
    cursor: pointer;
  }
  .overlay .card {
    width: 100%;
    height: 100%;
  }
  .overlay .card-back .back-idea {
    font-size: 1.1rem;
    line-height: 1.75;
  }
  .overlay .hint {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
    pointer-events: none;
  }

  /* --- RESPONSIVE --- */
  @media (max-width: 600px) {
    header h1 { font-size: 1.8rem; }
    .grid { padding: 1.5rem; gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    .card-container { height: 280px; }
    .card-back { padding: 1rem; }
    .card-back .back-idea { font-size: 0.78rem; line-height: 1.45; }
    .card-back .back-name { font-size: 0.65rem; padding-top: 0.5rem; }
    .overlay .focused-card { width: 85vw; height: 70vh; max-width: 340px; max-height: 500px; }
  }
</style>
</head>
<body>

<header>
  <h1>Sparks</h1>
</header>

<div class="filters">
  <span class="filter-label">Region</span>
  <button class="filter-btn genre-btn active" data-filter="all" data-group="genre">All</button>
  <button class="filter-btn genre-btn" data-filter="europe" data-group="genre">Europe</button>
  <button class="filter-btn genre-btn" data-filter="americas" data-group="genre">Americas</button>
  <button class="filter-btn genre-btn" data-filter="asia" data-group="genre">Asia</button>
  <button class="filter-btn genre-btn" data-filter="africa-mideast" data-group="genre">Africa & Middle East</button>
</div>
<div class="filters">
  <span class="filter-label">Era</span>
  <button class="filter-btn era-btn active" data-filter="all" data-group="era">All</button>
  <button class="filter-btn era-btn" data-filter="ancient" data-group="era">Ancient</button>
  <button class="filter-btn era-btn" data-filter="medieval" data-group="era">Medieval</button>
  <button class="filter-btn era-btn" data-filter="19c" data-group="era">19th c.</button>
  <button class="filter-btn era-btn" data-filter="20c" data-group="era">20th c.</button>
</div>

<div class="grid" id="grid"></div>

<div class="overlay" id="overlay">
  <div class="focused-card" id="focusedCard"></div>
  <div class="hint">click card to flip · esc to close</div>
</div>

<script>
// --- SVG PORTRAIT GENERATORS ---
// Each returns an SVG string — abstract, geometric, evocative of the thinker's ideas

const portraits = {
  // Nietzsche: jagged mountain peak with a rising spiral — eternal return, the heights
  nietzsche: () => `<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="n1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8a6a4a" stop-opacity="0.4"/><stop offset="100%" stop-color="#141418" stop-opacity="0"/></linearGradient>
      <linearGradient id="n2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#c4956a" stop-opacity="0.3"/><stop offset="100%" stop-color="#141418" stop-opacity="0"/></linearGradient>
    </defs>
    <rect width="300" height="400" fill="#141418"/>
    <polygon points="150,40 40,280 260,280" fill="none" stroke="#8a6a4a" stroke-width="1" opacity="0.5"/>
    <polygon points="150,80 70,260 230,260" fill="url(#n1)" stroke="none"/>
    <polygon points="150,60 20,300 280,300" fill="none" stroke="#c4956a" stroke-width="0.5" opacity="0.25"/>
    <path d="M150,260 Q160,200 150,160 Q140,120 155,80" fill="none" stroke="#c4956a" stroke-width="1.5" opacity="0.6"/>
    <circle cx="155" cy="78" r="3" fill="#c4956a" opacity="0.7"/>
    <line x1="40" y1="280" x2="260" y2="280" stroke="#8a6a4a" stroke-width="0.5" opacity="0.4"/>
    <line x1="0" y1="320" x2="300" y2="320" stroke="#2a2a32" stroke-width="0.5"/>
    <text x="150" y="350" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="7" fill="#8a6a4a" letter-spacing="0.3em" opacity="0.5">ÜBERMENSCH</text>
  </svg>`,

  // Foucault: panopticon — concentric rings with radiating lines, surveillance
  foucault: () => `<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="f1"><stop offset="0%" stop-color="#c4956a" stop-opacity="0.15"/><stop offset="100%" stop-color="#141418" stop-opacity="0"/></radialGradient>
    </defs>
    <rect width="300" height="400" fill="#141418"/>
    <circle cx="150" cy="180" r="120" fill="none" stroke="#2a2a32" stroke-width="0.5"/>
    <circle cx="150" cy="180" r="90" fill="none" stroke="#3a3428" stroke-width="0.5"/>
    <circle cx="150" cy="180" r="60" fill="none" stroke="#8a6a4a" stroke-width="0.5" opacity="0.6"/>
    <circle cx="150" cy="180" r="30" fill="none" stroke="#8a6a4a" stroke-width="1" opacity="0.7"/>
    <circle cx="150" cy="180" r="6" fill="#c4956a" opacity="0.5"/>
    ${[0,30,60,90,120,150,180,210,240,270,300,330].map(a => {
      const rad = a * Math.PI / 180;
      return `<line x1="150" y1="180" x2="${150 + 120*Math.cos(rad)}" y2="${180 + 120*Math.sin(rad)}" stroke="#8a6a4a" stroke-width="0.3" opacity="0.3"/>`;
    }).join('')}
    <circle cx="150" cy="180" r="100" fill="url(#f1)"/>
    <text x="150" y="350" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="7" fill="#8a6a4a" letter-spacing="0.3em" opacity="0.5">PANOPTICON</text>
  </svg>`,

  // Beauvoir: two overlapping forms — self and other, becoming
  beauvoir: () => `<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="b1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#c4956a" stop-opacity="0.2"/><stop offset="100%" stop-color="#8a6a4a" stop-opacity="0.05"/></linearGradient>
      <linearGradient id="b2" x1="1" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c4956a" stop-opacity="0.15"/><stop offset="100%" stop-color="#8a6a4a" stop-opacity="0.05"/></linearGradient>
    </defs>
    <rect width="300" height="400" fill="#141418"/>
    <ellipse cx="120" cy="170" rx="70" ry="100" fill="url(#b1)" stroke="#8a6a4a" stroke-width="0.5" opacity="0.8"/>
    <ellipse cx="180" cy="190" rx="70" ry="100" fill="url(#b2)" stroke="#c4956a" stroke-width="0.8" opacity="0.6"/>
    <path d="M140,100 C160,140 160,220 140,270" fill="none" stroke="#c4956a" stroke-width="0.5" opacity="0.4" stroke-dasharray="2,4"/>
    <circle cx="150" cy="180" r="2" fill="#c4956a" opacity="0.8"/>
    <text x="150" y="348" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="7" fill="#8a6a4a" letter-spacing="0.3em" opacity="0.5">DEVENIR</text>
  </svg>`,

  // Fanon: shattered mirror — fractured rectangle, decolonization
  fanon: () => `<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
    <rect width="300" height="400" fill="#141418"/>
    <rect x="80" y="80" width="140" height="200" fill="none" stroke="#8a6a4a" stroke-width="0.8" opacity="0.5"/>
    <line x1="80" y1="80" x2="160" y2="180" stroke="#c4956a" stroke-width="0.5" opacity="0.6"/>
    <line x1="220" y1="80" x2="140" y2="200" stroke="#c4956a" stroke-width="0.5" opacity="0.5"/>
    <line x1="80" y1="280" x2="180" y2="150" stroke="#8a6a4a" stroke-width="0.5" opacity="0.4"/>
    <line x1="220" y1="280" x2="120" y2="160" stroke="#8a6a4a" stroke-width="0.5" opacity="0.3"/>
    <polygon points="80,80 160,180 80,180" fill="#c4956a" opacity="0.06"/>
    <polygon points="220,80 160,180 220,160" fill="#8a6a4a" opacity="0.08"/>
    <polygon points="80,280 140,200 80,200" fill="#c4956a" opacity="0.04"/>
    <polygon points="220,280 180,150 220,200" fill="#8a6a4a" opacity="0.05"/>
    <line x1="130" y1="130" x2="190" y2="230" stroke="#c4956a" stroke-width="0.3" opacity="0.5"/>
    <circle cx="155" cy="175" r="2.5" fill="#c4956a" opacity="0.6"/>
    <text x="150" y="348" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="7" fill="#8a6a4a" letter-spacing="0.3em" opacity="0.5">RUPTURE</text>
  </svg>`,

  // Deleuze: rhizome — organic branching network, no center
  deleuze: () => `<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
    <rect width="300" height="400" fill="#141418"/>
    ${(() => {
      const nodes = [[90,100],[200,90],[60,180],[150,160],[240,170],[100,240],[180,250],[50,300],[220,290],[150,330],[130,130],[210,210],[80,210],[170,110],[250,250]];
      const edges = [[0,3],[1,3],[2,3],[3,4],[2,5],[3,6],[5,7],[4,8],[6,9],[0,10],[1,13],[4,11],[2,12],[8,14],[6,11],[10,3],[5,12],[11,8],[13,4],[9,7]];
      let s = '';
      edges.forEach(([a,b]) => {
        const [x1,y1] = nodes[a]; const [x2,y2] = nodes[b];
        const mx = (x1+x2)/2 + (Math.random()-0.5)*30;
        const my = (y1+y2)/2 + (Math.random()-0.5)*30;
        s += `<path d="M${x1},${y1} Q${mx},${my} ${x2},${y2}" fill="none" stroke="#8a6a4a" stroke-width="0.5" opacity="0.4"/>`;
      });
      nodes.forEach(([x,y], i) => {
        const r = i === 3 ? 3 : 1.5;
        s += `<circle cx="${x}" cy="${y}" r="${r}" fill="#c4956a" opacity="${i===3?0.7:0.35}"/>`;
      });
      return s;
    })()}
    <text x="150" y="378" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="7" fill="#8a6a4a" letter-spacing="0.3em" opacity="0.5">RHIZOME</text>
  </svg>`,

  // Camus: Sisyphus — circle at top of slope, absurd sun
  camus: () => `<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="c1"><stop offset="0%" stop-color="#c4956a" stop-opacity="0.2"/><stop offset="80%" stop-color="#141418" stop-opacity="0"/></radialGradient>
    </defs>
    <rect width="300" height="400" fill="#141418"/>
    <circle cx="150" cy="80" r="50" fill="url(#c1)"/>
    <circle cx="150" cy="80" r="30" fill="none" stroke="#8a6a4a" stroke-width="0.5" opacity="0.5"/>
    <circle cx="150" cy="80" r="15" fill="none" stroke="#c4956a" stroke-width="0.8" opacity="0.4"/>
    <line x1="40" y1="310" x2="260" y2="180" stroke="#8a6a4a" stroke-width="1" opacity="0.4"/>
    <circle cx="220" cy="200" r="18" fill="none" stroke="#c4956a" stroke-width="1.5" opacity="0.6"/>
    <circle cx="220" cy="200" r="5" fill="#c4956a" opacity="0.15"/>
    <path d="M60,300 Q80,290 100,295 Q120,300 130,280" fill="none" stroke="#8a6a4a" stroke-width="0.5" opacity="0.3" stroke-dasharray="3,3"/>
    <text x="150" y="355" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="7" fill="#8a6a4a" letter-spacing="0.3em" opacity="0.5">L'ABSURDE</text>
  </svg>`,

  // Barthes: text as woven threads — horizontal lines dissolving
  barthes: () => `<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
    <rect width="300" height="400" fill="#141418"/>
    ${Array.from({length: 25}, (_, i) => {
      const y = 60 + i * 11;
      const x1 = 40 + Math.sin(i * 0.7) * 20;
      const x2 = 260 - Math.cos(i * 0.5) * 20;
      const op = 0.15 + Math.sin(i * 0.4) * 0.15;
      const sw = 0.3 + Math.sin(i * 0.6) * 0.3;
      const dash = i > 15 ? `stroke-dasharray="${3 + i%4},${2 + i%3}"` : '';
      return `<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="${i%3===0?'#c4956a':'#8a6a4a'}" stroke-width="${sw}" opacity="${op}" ${dash}/>`;
    }).join('')}
    <line x1="150" y1="50" x2="150" y2="340" stroke="#c4956a" stroke-width="0.3" opacity="0.2"/>
    <line x1="120" y1="55" x2="120" y2="335" stroke="#8a6a4a" stroke-width="0.3" opacity="0.15"/>
    <line x1="180" y1="55" x2="180" y2="335" stroke="#8a6a4a" stroke-width="0.3" opacity="0.15"/>
    <text x="150" y="355" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="7" fill="#8a6a4a" letter-spacing="0.3em" opacity="0.5">TISSU</text>
  </svg>`,

  // Borges: labyrinth — nested squares spiraling inward
  borges: () => `<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
    <rect width="300" height="400" fill="#141418"/>
    ${[0,1,2,3,4,5,6].map(i => {
      const m = 30 + i * 15;
      const w = 300 - m*2;
      const h = 280 - m*2;
      const y = 50 + m;
      const gap = (i % 4);
      const op = 0.15 + i * 0.06;
      let path = '';
      if (gap === 0) path = `M${m},${y} L${m+w},${y} L${m+w},${y+h} L${m},${y+h}`;
      else if (gap === 1) path = `M${m+w},${y} L${m+w},${y+h} L${m},${y+h} L${m},${y}`;
      else if (gap === 2) path = `M${m+w},${y+h} L${m},${y+h} L${m},${y} L${m+w},${y}`;
      else path = `M${m},${y+h} L${m},${y} L${m+w},${y} L${m+w},${y+h}`;
      return `<path d="${path}" fill="none" stroke="#8a6a4a" stroke-width="0.6" opacity="${op}"/>`;
    }).join('')}
    <circle cx="150" cy="190" r="4" fill="#c4956a" opacity="0.4"/>
    <circle cx="150" cy="190" r="12" fill="none" stroke="#c4956a" stroke-width="0.5" opacity="0.3"/>
    <text x="150" y="368" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="7" fill="#8a6a4a" letter-spacing="0.3em" opacity="0.5">LABERINTO</text>
  </svg>`,

  // Dostoevsky: cross/divide — vertical split, chiaroscuro
  dostoevsky: () => `<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="d1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1a1810" stop-opacity="0.8"/><stop offset="50%" stop-color="#141418"/><stop offset="100%" stop-color="#0a0a0c" stop-opacity="0.8"/></linearGradient>
    </defs>
    <rect width="300" height="400" fill="#141418"/>
    <rect x="0" y="0" width="150" height="400" fill="#1a1810" opacity="0.4"/>

const grid = document.getElementById('grid');
const overlay = document.getElementById('overlay');
const focusedCardEl = document.getElementById('focusedCard');

function createCardHTML(t) {
  const portraitSVG = portraits[t.portrait] ? portraits[t.portrait]() : '';
  return `
    <div class="card">
      <div class="card-face card-front">
        <div class="card-portrait">
          ${portraitSVG}
          <div class="silhouette"></div>
        </div>
        <div class="card-info">
          <div class="card-name">${t.name}</div>
          <div class="card-years">${t.years}</div>
          <div class="card-tag">${{'europe':'Europe','americas':'Americas','asia':'Asia','africa-mideast':'Africa & Middle East'}[t.tag] || t.tag}</div>
        </div>
      </div>
      <div class="card-face card-back">
        <div class="back-label">Core Idea</div>
        <div class="back-idea">${t.idea}</div>
        <div class="back-name">— ${t.name}</div>
      </div>
    </div>
  `;
}

// --- SORTING HELPERS ---

// Parse a year string like "~369–286 BC", "1844–1900", "~2400 BC" into a sortable number (birth year)
function parseYear(years) {
  const s = years.replace(/~/g, '').trim();
  // grab the first number
  const m = s.match(/(\d+)/);
  if (!m) return 0;
  let y = parseInt(m[1]);
  // check if BC
  if (/BC/i.test(s)) y = -y;
  return y;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

let displayOrder = shuffle(thinkers.map((_, i) => i));
let currentRegion = 'all';
let currentEra = 'all';

function getFilteredOrder() {
  let filtered = displayOrder.filter(i => {
    const t = thinkers[i];
    const regionMatch = currentRegion === 'all' || t.tag === currentRegion;
    const eraMatch = currentEra === 'all' || t.era === currentEra;
    return regionMatch && eraMatch;
  });

  // Sort chronologically when any filter is active
  const isFiltered = currentRegion !== 'all' || currentEra !== 'all';
  if (isFiltered) {
    filtered.sort((a, b) => parseYear(thinkers[a].years) - parseYear(thinkers[b].years));
  }

  return filtered;
}

function renderGrid() {
  grid.innerHTML = '';
  const filtered = getFilteredOrder();
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">No thinkers match these filters</div>';
    return;
  }
  filtered.forEach((thinkerIdx, renderIdx) => {
    const t = thinkers[thinkerIdx];
    const container = document.createElement('div');
    container.className = 'card-container';
    container.style.animationDelay = `${renderIdx * 0.06}s`;
    container.dataset.thinkerIndex = thinkerIdx;
    container.innerHTML = createCardHTML(t);

    let clickCount = 0;
    let clickTimer = null;

    container.addEventListener('click', (e) => {
      e.stopPropagation();
      clickCount++;
      if (clickCount === 1) {
        clickTimer = setTimeout(() => {
          container.querySelector('.card').classList.toggle('flipped');
          clickCount = 0;
        }, 250);
      } else if (clickCount === 2) {
        clearTimeout(clickTimer);
        clickCount = 0;
        openFocused(thinkerIdx);
      }
    });

    grid.appendChild(container);
  });
}

// --- FOCUS OVERLAY ---

function openFocused(index) {
  const t = thinkers[index];
  focusedCardEl.innerHTML = createCardHTML(t);
  grid.classList.add('dimmed');
  overlay.style.display = 'flex';
  requestAnimationFrame(() => overlay.classList.add('visible'));

  focusedCardEl.addEventListener('click', () => {
    focusedCardEl.querySelector('.card').classList.toggle('flipped');
  });
}

function closeFocused() {
  overlay.classList.remove('visible');
  grid.classList.remove('dimmed');
  setTimeout(() => { overlay.style.display = 'none'; }, 350);
}

overlay.addEventListener('click', (e) => {
  if (e.target === overlay) closeFocused();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeFocused();
});

// --- FILTERS ---
document.querySelectorAll('.genre-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentRegion = btn.dataset.filter;
    renderGrid();
  });
});

document.querySelectorAll('.era-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.era-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentEra = btn.dataset.filter;
    renderGrid();
  });
});

renderGrid();
